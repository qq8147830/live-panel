<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100">
  <!-- 背景渐变 -->
  <defs>
    <linearGradient id="gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1991a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#1991a3;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ec4899;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- 圆形背景 -->
  <circle cx="50" cy="50" r="45" fill="url(#gradient)" stroke="#ffffff" stroke-width="2"/>
  
  <!-- 🦍 大猩猩emoji文字 -->
  <text x="50" y="65" text-anchor="middle" font-family="Arial, Helvetica, sans-serif" font-size="50" font-weight="bold" fill="#ffffff">
    🦍
  </text>
  
  <!-- 发光效果 -->
  <circle cx="50" cy="50" r="48" fill="none" stroke="url(#textGradient)" stroke-width="3" opacity="0.7">
    <animate attributeName="r" values="48;52;48" dur="3s" repeatCount="indefinite" />
  </circle>
</svg>