<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>AI Agency 专家团</title>
  <style>
    :root {
      --bg: #0b1220;
      --panel: #111a2e;
      --panel-2: #17233b;
      --border: #24324f;
      --text: #e8eefc;
      --muted: #93a4c7;
      --accent: #4f8cff;
      --accent-2: #22c55e;
      --danger: #f97316;
      --deep: #a78bfa;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: radial-gradient(circle at top, #15213a 0%, var(--bg) 45%);
      color: var(--text);
      height: 100vh;
      display: flex;
    }
    .sidebar {
      width: 300px;
      background: rgba(17, 26, 46, 0.95);
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      padding: 20px;
      gap: 12px;
      min-height: 0;
      height: 100vh;
    }
    .brand { flex-shrink: 0; }
    .brand h1 { margin: 0; font-size: 20px; }
    .brand p {
      margin: 4px 0 0;
      color: var(--muted);
      font-size: 12px;
      line-height: 1.4;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
      overflow: hidden;
    }
    .mode-tabs { display: flex; gap: 8px; flex-shrink: 0; }
    .mode-tabs button {
      flex: 1;
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--text);
      border-radius: 10px;
      padding: 10px;
      cursor: pointer;
    }
    .mode-tabs button.active {
      border-color: var(--accent);
      background: rgba(79, 140, 255, 0.15);
    }
    .filters input, .filters select {
      width: 100%;
      background: var(--panel-2);
      border: 1px solid var(--border);
      color: var(--text);
      border-radius: 10px;
      padding: 8px 12px;
      margin-top: 6px;
    }
    .filters { flex-shrink: 0; }
    .filters[hidden],
    .expert-list[hidden],
    .micro-brief[hidden] {
      display: none !important;
    }
    .expert-list, .micro-brief {
      overflow-y: auto;
      flex: 1 1 auto;
      display: flex;
      flex-direction: column;
      gap: 8px;
      padding-right: 4px;
      min-height: calc(100vh - 220px);
      max-height: none;
    }
    .expert-item, .micro-brief-card, .pipeline-step {
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 12px;
      padding: 10px 12px;
    }
    .expert-item { cursor: pointer; }
    .expert-item.active { border-color: var(--accent); }
    .expert-item .name, .micro-brief-card .name, .pipeline-step .name { font-weight: 600; font-size: 14px; }
    .expert-item .meta, .micro-brief-card .meta, .pipeline-step .meta { color: var(--muted); font-size: 12px; margin-top: 4px; line-height: 1.45; }
    .micro-pipeline {
      display: flex;
      flex-direction: column;
      gap: 0;
      margin-top: 4px;
    }
    .micro-collab-summary {
      margin-top: 12px;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }
    .micro-collab-summary .collab-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 6px;
    }
    .pipeline-stepbar .pipeline-step {
      position: relative;
      border: none;
      background: transparent;
      border-radius: 0;
      padding: 0 0 18px 26px;
      margin: 0;
    }
    .pipeline-stepbar .pipeline-step:last-child {
      padding-bottom: 4px;
    }
    .pipeline-stepbar .pipeline-step::before {
      content: '';
      position: absolute;
      left: 5px;
      top: 6px;
      width: 12px;
      height: 12px;
      border-radius: 50%;
      border: 2px solid var(--accent);
      background: var(--panel);
      box-shadow: 0 0 0 3px rgba(79, 140, 255, 0.12);
      z-index: 1;
    }
    .pipeline-stepbar .pipeline-step::after {
      content: '';
      position: absolute;
      left: 10px;
      top: 20px;
      bottom: 0;
      width: 2px;
      background: linear-gradient(180deg, rgba(79, 140, 255, 0.55), rgba(79, 140, 255, 0.12));
    }
    .pipeline-stepbar .pipeline-step:last-child::after {
      display: none;
    }
    .pipeline-step .step-head {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-bottom: 6px;
    }
    .pipeline-step .phase-tag {
      flex-shrink: 0;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.04em;
      color: #dbeafe;
      background: rgba(79, 140, 255, 0.22);
      border: 1px solid rgba(79, 140, 255, 0.45);
      border-radius: 6px;
      padding: 2px 7px;
      line-height: 1.4;
    }
    .pipeline-step .step-title {
      font-size: 13px;
      font-weight: 600;
      color: var(--text);
      line-height: 1.35;
    }
    .pipeline-step .step-body {
      border: 1px solid var(--border);
      background: var(--panel-2);
      border-radius: 10px;
      padding: 10px 12px;
    }
    .pipeline-step .step-num {
      display: inline-block;
      font-size: 11px;
      color: var(--accent);
      border: 1px solid rgba(79, 140, 255, 0.4);
      border-radius: 999px;
      padding: 2px 8px;
      margin-bottom: 6px;
    }
    .main {
      flex: 1;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }
    .topbar {
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      flex-wrap: wrap;
    }
    .status { color: var(--muted); font-size: 13px; }
    .thinking-toggle {
      display: flex;
      gap: 0;
      border: 1px solid var(--border);
      border-radius: 10px;
      overflow: hidden;
    }
    .thinking-toggle button {
      border: none;
      background: var(--panel-2);
      color: var(--muted);
      padding: 8px 14px;
      font-size: 13px;
      cursor: pointer;
    }
    .thinking-toggle button.active {
      background: rgba(79, 140, 255, 0.2);
      color: var(--text);
    }
    .thinking-toggle button.active.deep {
      background: rgba(167, 139, 250, 0.2);
      color: #ddd6fe;
    }
    .messages {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }
    .msg {
      max-width: 85%;
      padding: 12px 14px;
      border-radius: 14px;
      line-height: 1.6;
      white-space: pre-wrap;
      word-break: break-word;
      position: relative;
    }
    .msg.user {
      align-self: flex-end;
      background: var(--accent);
      color: white;
    }
    .msg.assistant {
      align-self: flex-start;
      background: rgba(23, 35, 59, 0.95);
      border: 1px solid var(--border);
    }
    .msg.status-bubble {
      align-self: center;
      max-width: 92%;
      background: rgba(79, 140, 255, 0.08);
      border: 1px dashed rgba(79, 140, 255, 0.35);
      color: var(--muted);
      font-size: 13px;
      text-align: center;
      line-height: 1.55;
    }
    .msg.status-bubble.deep {
      background: rgba(167, 139, 250, 0.08);
      border-color: rgba(167, 139, 250, 0.35);
    }
    .msg.status-bubble .status-title {
      font-size: 14px;
      font-weight: 600;
      color: var(--text);
      margin-bottom: 4px;
    }
    .msg.status-bubble.deep .status-title { color: #ddd6fe; }
    .msg.status-bubble .status-estimate { color: var(--accent); }
    .msg.status-bubble.deep .status-estimate { color: #c4b5fd; }
    .msg.status-bubble .status-elapsed { font-size: 12px; margin-top: 4px; }
    .msg.status-bubble .status-step {
      font-size: 13px;
      margin-top: 8px;
      color: #93c5fd;
      font-weight: 500;
    }
    .msg.status-bubble.deep .status-step { color: #c4b5fd; }
    .msg.error {
      border-color: rgba(249, 115, 22, 0.5);
      background: rgba(249, 115, 22, 0.08);
    }
    .msg .badge {
      font-size: 12px;
      color: var(--accent);
      margin-bottom: 6px;
    }
    .msg .meta-line {
      font-size: 11px;
      color: var(--muted);
      margin-top: 8px;
    }
    .msg-actions {
      display: flex;
      gap: 8px;
      margin-top: 8px;
    }
    .msg-actions button {
      border: 1px solid var(--border);
      background: transparent;
      color: var(--muted);
      border-radius: 8px;
      padding: 4px 10px;
      font-size: 12px;
      cursor: pointer;
    }
    .msg-actions button:hover { color: var(--text); border-color: var(--accent); }
    .example-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 0 20px 8px;
    }
    .example-chips button {
      border: 1px solid var(--border);
      background: var(--panel-2);
      color: var(--muted);
      border-radius: 999px;
      padding: 6px 12px;
      font-size: 12px;
      cursor: pointer;
    }
    .example-chips button:hover { color: var(--text); border-color: var(--accent); }
    .composer {
      border-top: 1px solid var(--border);
      padding: 16px 20px;
      display: flex;
      gap: 12px;
      align-items: flex-end;
    }
    .composer textarea {
      flex: 1;
      min-height: 56px;
      max-height: 180px;
      resize: vertical;
      background: var(--panel);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 12px 14px;
      font: inherit;
    }
    .composer-actions { display: flex; flex-direction: column; gap: 8px; }
    .composer button {
      min-width: 96px;
      border: none;
      border-radius: 14px;
      background: var(--accent);
      color: white;
      font-weight: 600;
      cursor: pointer;
      padding: 12px 16px;
    }
    .composer button.secondary {
      background: transparent;
      border: 1px solid var(--border);
      color: var(--muted);
      font-weight: 500;
    }
    .composer button:disabled { opacity: 0.6; cursor: not-allowed; }
    .hint { color: var(--muted); font-size: 12px; padding: 0 20px 12px; }
    @media (max-width: 900px) {
      body { flex-direction: column; }
      .sidebar {
        width: 100%;
        height: auto;
        min-height: min(92vh, 100dvh);
        max-height: min(92vh, 100dvh);
      }
      .expert-list, .micro-brief {
        min-height: calc(72vh - 12rem);
      }
    }
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="brand">
      <h1>AI Agency 专家团</h1>
      <p>基于 agency-agents 的多智能体系统。支持单专家对话与 NEXUS-Micro 事故响应流水线。</p>
    </div>
    <div class="mode-tabs">
      <button id="modeChat" class="active" type="button">单专家</button>
      <button id="modeMicro" type="button">NEXUS-Micro</button>
    </div>
    <div class="filters" id="filters">
      <label>搜索专家
        <input id="searchInput" placeholder="例如 frontend / 前端 / 微博 / 设计" />
      </label>
      <label>领域
        <select id="divisionSelect">
          <option value="">全部领域</option>
        </select>
      </label>
    </div>
    <div class="expert-list" id="expertList"></div>
    <div class="micro-brief" id="microBrief" hidden>
      <div class="micro-brief-card">
        <div class="name">P1 事故响应</div>
        <div class="meta">描述事故现象与影响范围即可。系统将按固定流水线自动协作，完成后在右侧对话区一次性展示全部步骤结果。</div>
        <div class="micro-collab-summary">
          <div class="collab-title">P1–P4 四步协作说明</div>
          <div class="meta">四位专家按固定顺序依次接手：上一步输出自动传入下一步上下文，形成「接警 → 缓解 → 根因 → 通报」闭环，最终在右侧汇总展示。</div>
        </div>
      </div>
      <div class="micro-pipeline pipeline-stepbar" id="microPipeline"></div>
    </div>
  </aside>

  <main class="main">
    <div class="topbar">
      <div>
        <strong id="modeLabel">单专家模式</strong>
        <div class="status" id="statusText">正在连接...</div>
      </div>
      <div style="display:flex;align-items:center;gap:12px;flex-wrap:wrap;">
        <div class="thinking-toggle" id="thinkingToggle">
          <button type="button" data-mode="fast" class="active">快速模式</button>
          <button type="button" data-mode="deep">深度思考</button>
        </div>
        <div class="status" id="selectedExpert">自动路由</div>
      </div>
    </div>
    <div class="messages" id="messages"></div>
    <div class="example-chips" id="exampleChips"></div>
    <div class="hint" id="hintText">单专家模式：不选专家时将自动路由。</div>
    <div class="composer">
      <textarea id="input" placeholder="输入你的问题或事故描述..."></textarea>
      <div class="composer-actions">
        <button id="sendBtn" type="button">发送</button>
        <button id="cancelBtn" type="button" class="secondary" hidden>取消</button>
      </div>
    </div>
  </main>

  <script>
    const API_BASE = (() => {
      const path = window.location.pathname || '';
      // Vercel 上 Python 函数挂在 /api/ai-agency/*；/ai-agency/api/* 的 rewrite 未生效
      return path.includes('/ai-agency') ? '/api/ai-agency' : '/api';
    })();

    const STORAGE_KEY = 'ai-agency-state-v1';
    const CHAT_EXAMPLES = [
      '帮我设计一个 SaaS 产品的 MVP 功能清单',
      '微博运营策略：新品牌冷启动怎么做？',
      '前端性能优化：首屏加载慢的排查思路',
    ];
    const MICRO_EXAMPLES = [
      'P1：生产环境 API 502，影响全部用户下单，15 分钟前开始',
      'P1：数据库主从延迟飙升，写入失败率 8%',
      'P1：CDN 缓存污染导致静态资源 404，多区域受影响',
    ];
    const MICRO_PHASE_META = [
      {
        phase: 'P1',
        title: '接警定级',
        desc: '确认事故、评估影响范围、判定严重等级，并制定即时响应计划。',
      },
      {
        phase: 'P2',
        title: '部署缓解',
        desc: '基于指挥评估，提出回滚、缓解或部署动作及具体执行命令。',
      },
      {
        phase: 'P3',
        title: '根因修复',
        desc: '调查后端/系统根因，提出修复方案与验证步骤。',
      },
      {
        phase: 'P4',
        title: '沟通通报',
        desc: '起草面向用户的状态更新与内部干系人通报。',
      },
    ];

    const state = {
      mode: 'chat',
      experts: [],
      selectedExpertId: '',
      thinkingMode: 'fast',
      loading: false,
      pipeline: [],
      messages: [],
      abortController: null,
      waitTimer: null,
      lastFailedRequest: null,
      waitEstimate: null,
      waitStepLine: '',
    };

    const els = {
      modeChat: document.getElementById('modeChat'),
      modeMicro: document.getElementById('modeMicro'),
      filters: document.getElementById('filters'),
      searchInput: document.getElementById('searchInput'),
      divisionSelect: document.getElementById('divisionSelect'),
      expertList: document.getElementById('expertList'),
      microBrief: document.getElementById('microBrief'),
      microPipeline: document.getElementById('microPipeline'),
      messages: document.getElementById('messages'),
      input: document.getElementById('input'),
      sendBtn: document.getElementById('sendBtn'),
      cancelBtn: document.getElementById('cancelBtn'),
      statusText: document.getElementById('statusText'),
      selectedExpert: document.getElementById('selectedExpert'),
      modeLabel: document.getElementById('modeLabel'),
      hintText: document.getElementById('hintText'),
      exampleChips: document.getElementById('exampleChips'),
      thinkingToggle: document.getElementById('thinkingToggle'),
    };

    function saveState() {
      const payload = {
        mode: state.mode,
        thinkingMode: state.thinkingMode,
        selectedExpertId: state.selectedExpertId,
        messages: state.messages.slice(-40),
      };
      try { localStorage.setItem(STORAGE_KEY, JSON.stringify(payload)); } catch (_) {}
    }

    function loadState() {
      try {
        const raw = localStorage.getItem(STORAGE_KEY);
        if (!raw) return;
        const data = JSON.parse(raw);
        if (data.thinkingMode) state.thinkingMode = data.thinkingMode;
        if (data.mode) state.mode = data.mode;
        if (data.selectedExpertId) state.selectedExpertId = data.selectedExpertId;
        if (Array.isArray(data.messages)) state.messages = data.messages;
      } catch (_) {}
    }

    function escapeHtml(text) {
      return String(text)
        .replaceAll('&', '&amp;')
        .replaceAll('<', '&lt;')
        .replaceAll('>', '&gt;');
    }

    function formatElapsed(ms) {
      if (ms < 1000) return `${ms} 毫秒`;
      return `${(ms / 1000).toFixed(1)} 秒`;
    }

    function defaultEstimate(mode, micro = false) {
      const fast = micro ? [32, 60] : [8, 15];
      const deep = micro ? [100, 240] : [25, 60];
      const [lo, hi] = mode === 'deep' ? deep : fast;
      return { low: lo, high: hi };
    }

    function formatDuration(seconds) {
      const s = Math.max(0, Math.round(seconds));
      if (s < 60) return `${s} 秒`;
      const m = Math.floor(s / 60);
      const r = s % 60;
      return r === 0 ? `${m} 分钟` : `${m} 分 ${r} 秒`;
    }

    function formatEstimateRange(low, high) {
      if (low === high) return `约 ${formatDuration(low)}`;
      if (low < 60 && high < 60) return `约 ${low}–${high} 秒`;
      return `约 ${formatDuration(low)}–${formatDuration(high)}`;
    }

    function thinkingStatusTitle(thinkingMode, isMicro) {
      const prefix = isMicro ? 'NEXUS-Micro · ' : '';
      return thinkingMode === 'deep'
        ? `${prefix}🧠 深度思考中…`
        : `${prefix}⚡ 快速思考中…`;
    }

    function buildStatusHtml(thinkingMode, isMicro, estimate, elapsedSecs, stepLine = '') {
      const est = estimate || defaultEstimate(thinkingMode, isMicro);
      const title = thinkingStatusTitle(thinkingMode, isMicro);
      const estimateText = `请等待，预计 ${formatEstimateRange(est.low, est.high)}`;
      const elapsedText = `已等待 ${elapsedSecs} 秒`;
      const stepHtml = stepLine
        ? `<div class="status-step">${escapeHtml(stepLine)}</div>`
        : '';
      return `
        <div class="status-title">${escapeHtml(title)}</div>
        <div class="status-estimate">${escapeHtml(estimateText)}</div>
        <div class="status-elapsed">${escapeHtml(elapsedText)}</div>
        ${stepHtml}
      `;
    }

    function microStepStatusLine(event) {
      const modeLabel = event.thinking_mode === 'deep' ? '深度思考' : '快速思考';
      const label = event.agent_label || event.agent_name || '专家';
      return `Step ${event.step}/${event.total_steps} · ${label} ${modeLabel}中…`;
    }

    function renderThinkingToggle() {
      els.thinkingToggle.querySelectorAll('button').forEach((btn) => {
        const active = btn.dataset.mode === state.thinkingMode;
        btn.classList.toggle('active', active);
        btn.classList.toggle('deep', active && state.thinkingMode === 'deep');
      });
    }

    function createAssistantNode(content, options = {}) {
      const node = document.createElement('div');
      node.className = `msg assistant${options.error ? ' error' : ''}`;
      const badge = options.badge ? `<div class="badge">${escapeHtml(options.badge)}</div>` : '';
      const meta = options.meta ? `<div class="meta-line">${escapeHtml(options.meta)}</div>` : '';
      const actions = options.copyable !== false
        ? `<div class="msg-actions"><button type="button" data-copy>复制</button></div>`
        : '';
      node.innerHTML = `${badge}<div class="msg-body">${escapeHtml(content)}</div>${meta}${actions}`;
      if (options.copyable !== false) {
        node.querySelector('[data-copy]').onclick = async () => {
          try {
            await navigator.clipboard.writeText(content);
            node.querySelector('[data-copy]').textContent = '已复制';
            setTimeout(() => { node.querySelector('[data-copy]').textContent = '复制'; }, 1500);
          } catch (_) {}
        };
      }
      return node;
    }

    function appendToHistory(role, content, extra = {}) {
      state.messages.push({ role, content, ...extra });
      saveState();
    }

    function renderMessagesFromState() {
      els.messages.innerHTML = '';
      if (!state.messages.length) showWelcome();
      else state.messages.forEach((item) => {
        if (item.role === 'user') addMessage('user', item.content, { persist: false });
        else addMessage('assistant', item.content, { persist: false, badge: item.badge, meta: item.meta });
      });
    }

    function showWelcome() {
      const isDeep = state.thinkingMode === 'deep';
      const isMicro = state.mode === 'micro';
      let text = '';
      if (isMicro) {
        text = isDeep
          ? 'NEXUS-Micro 深度思考模式：4 位专家将依次进行更严谨的逐步推理。等待期间会显示「Step 1/4 … 深度思考中」等进度，完成后一次性展示 4 步结果。'
          : 'NEXUS-Micro：P1 事故响应流水线，4 位专家依次协作。等待期间会实时显示当前步骤进度，完成后一次性展示全部步骤。';
      } else {
        text = isDeep
          ? '深度思考模式：专家会先逐步推理再作答，响应更慢但通常更严谨。支持流式输出。'
          : '你好，我是 AI Agency 专家团。你可以直接提问（自动路由专家），或在左侧点选专家。下方示例问题可一键填入。';
      }
      addMessage('assistant', text, { copyable: false, persist: false });
    }

    function addMessage(role, content, options = {}) {
      const { badge = '', meta = '', persist = true, copyable = true, error = false } = options;
      if (role === 'user') {
        const node = document.createElement('div');
        node.className = 'msg user';
        node.textContent = content;
        els.messages.appendChild(node);
      } else {
        const node = createAssistantNode(content, { badge, meta, copyable, error });
        els.messages.appendChild(node);
      }
      els.messages.scrollTop = els.messages.scrollHeight;
      if (persist) appendToHistory(role, content, { badge, meta });
    }

    function addStatusBubble(thinkingMode, isMicro, estimate) {
      state.waitEstimate = estimate || defaultEstimate(thinkingMode, isMicro);
      const node = document.createElement('div');
      node.className = `msg status-bubble${thinkingMode === 'deep' ? ' deep' : ''}`;
      node.id = 'statusBubble';
      node.innerHTML = buildStatusHtml(thinkingMode, isMicro, state.waitEstimate, 0);
      els.messages.appendChild(node);
      els.messages.scrollTop = els.messages.scrollHeight;
      return node;
    }

    function updateStatusBubble(elapsedSecs, extraLine = '') {
      const node = document.getElementById('statusBubble');
      if (!node) return;
      const isMicro = state.mode === 'micro';
      let html = buildStatusHtml(
        state.thinkingMode,
        isMicro,
        state.waitEstimate,
        elapsedSecs,
        state.waitStepLine,
      );
      if (extraLine) {
        html += `<div class="status-elapsed">${escapeHtml(extraLine)}</div>`;
      }
      node.innerHTML = html;
    }

    function removeStatusBubble() {
      document.getElementById('statusBubble')?.remove();
    }

    function startWaitTimer(thinkingMode, isMicro = false, estimate = null) {
      const start = Date.now();
      state.waitStepLine = '';
      addStatusBubble(thinkingMode, isMicro, estimate);
      state.waitTimer = setInterval(() => {
        const secs = Math.floor((Date.now() - start) / 1000);
        const est = state.waitEstimate || defaultEstimate(thinkingMode, isMicro);
        let extra = '';
        if (secs > est.high * 1.5) {
          extra = '仍在处理中，请稍候…';
        }
        updateStatusBubble(secs, extra);
      }, 1000);
    }

    function refreshStatusBubbleNow() {
      const node = document.getElementById('statusBubble');
      if (!node) return;
      const elapsedText = node.querySelector('.status-elapsed');
      const secs = elapsedText
        ? parseInt(elapsedText.textContent.replace(/[^\d]/g, ''), 10) || 0
        : 0;
      updateStatusBubble(secs);
    }

    function stopWaitTimer() {
      if (state.waitTimer) {
        clearInterval(state.waitTimer);
        state.waitTimer = null;
      }
      state.waitEstimate = null;
      state.waitStepLine = '';
      removeStatusBubble();
    }

    function renderMicroSteps(data) {
      const totalMeta = `总耗时 ${formatElapsed(data.elapsed_ms)} · ${data.thinking_mode === 'deep' ? '深度思考 ×4' : '快速模式 ×4'}`;
      (data.steps || []).forEach((step, index) => {
        addMessage('assistant', step.content, {
          badge: `Step ${index + 1} · ${step.agent_label || step.agent_name}`,
          meta: index === (data.steps.length - 1) ? totalMeta : '',
        });
      });
    }

    function setLoading(loading) {
      state.loading = loading;
      els.sendBtn.disabled = loading;
      els.cancelBtn.hidden = !loading;
    }

    function renderExampleChips() {
      const examples = state.mode === 'micro' ? MICRO_EXAMPLES : CHAT_EXAMPLES;
      els.exampleChips.innerHTML = '';
      examples.forEach((text) => {
        const btn = document.createElement('button');
        btn.type = 'button';
        btn.textContent = text.length > 28 ? `${text.slice(0, 28)}…` : text;
        btn.title = text;
        btn.onclick = () => { els.input.value = text; els.input.focus(); };
        els.exampleChips.appendChild(btn);
      });
    }

    async function loadHealth() {
      const res = await fetch(`${API_BASE}/health`);
      const data = await res.json();
      const degraded = data.status === 'degraded' || !data.experts;
      els.statusText.textContent = degraded
        ? `专家数据未加载（0 位）· 请检查 Vercel 是否提交了 registry/registry.json`
        : `专家 ${data.experts} 位 · 领域 ${data.divisions.length} 个${data.embedded_prompts ? ' · 内嵌 prompt' : ''}`;
      if (data.deploy_hint) console.warn('[ai-agency]', data.deploy_hint);
      return data;
    }

    async function loadPipeline() {
      const res = await fetch(`${API_BASE}/micro/pipeline`);
      const data = await res.json();
      state.pipeline = data.steps || [];
      renderMicroPipeline();
    }

    function renderMicroPipeline() {
      els.microPipeline.innerHTML = '';
      if (!state.pipeline.length) {
        MICRO_PHASE_META.forEach((meta) => {
          const item = document.createElement('div');
          item.className = 'pipeline-step';
          item.innerHTML = `
            <div class="step-head">
              <span class="phase-tag">${meta.phase}</span>
              <span class="step-title">${escapeHtml(meta.title)}</span>
            </div>
            <div class="step-body">
              <div class="meta">${escapeHtml(meta.desc)}</div>
            </div>
          `;
          els.microPipeline.appendChild(item);
        });
        return;
      }
      state.pipeline.forEach((step, index) => {
        const meta = MICRO_PHASE_META[index] || {
          phase: `P${step.step}`,
          title: step.role,
          desc: step.action,
        };
        const item = document.createElement('div');
        item.className = 'pipeline-step';
        item.innerHTML = `
          <div class="step-head">
            <span class="phase-tag">${meta.phase}</span>
            <span class="step-title">${escapeHtml(meta.title)}</span>
          </div>
          <div class="step-body">
            <div class="name">${escapeHtml(step.agent_label || step.agent_name)}</div>
            <div class="meta">${escapeHtml(meta.desc)}</div>
          </div>
        `;
        els.microPipeline.appendChild(item);
      });
    }

    async function loadExperts() {
      const division = els.divisionSelect.value;
      const query = els.searchInput.value.trim();
      const params = new URLSearchParams({ limit: '80' });
      if (division) params.set('division', division);
      if (query) params.set('query', query);
      const res = await fetch(`${API_BASE}/experts?${params}`);
      const data = await res.json();
      if (!res.ok) {
        state.experts = [];
        renderExperts();
        renderExpertLoadError(data.detail || '专家列表加载失败');
        return;
      }
      state.experts = data.experts || [];
      renderExperts();
      if (!state.experts.length) {
        renderExpertLoadError('专家列表为空。Vercel 部署需提交 registry/registry.json（建议 --embed-prompts 构建）。');
      }
    }

    function renderExpertLoadError(message) {
      if (document.getElementById('expertLoadError')) return;
      const item = document.createElement('div');
      item.id = 'expertLoadError';
      item.className = 'expert-item';
      item.innerHTML = `<div class="name" style="color:var(--danger)">⚠️ 专家数据未就绪</div><div class="meta">${escapeHtml(message)}</div>`;
      els.expertList.prepend(item);
    }

    function renderExperts() {
      els.expertList.innerHTML = '';
      document.getElementById('expertLoadError')?.remove();
      const auto = document.createElement('div');
      auto.className = `expert-item ${!state.selectedExpertId ? 'active' : ''}`;
      auto.innerHTML = '<div class="name">自动路由</div><div class="meta">根据问题匹配最合适专家</div>';
      auto.onclick = () => {
        state.selectedExpertId = '';
        els.selectedExpert.textContent = '自动路由';
        saveState();
        renderExperts();
      };
      els.expertList.appendChild(auto);

      state.experts.forEach((expert) => {
        const item = document.createElement('div');
        item.className = `expert-item ${state.selectedExpertId === expert.id ? 'active' : ''}`;
        item.innerHTML = `
          <div class="name">${expert.emoji || '🎭'} ${escapeHtml(expert.label || expert.name)}</div>
          <div class="meta">${escapeHtml(expert.division_label || expert.division)} · ${escapeHtml((expert.description || '').slice(0, 72))}</div>
        `;
        item.onclick = () => {
          state.selectedExpertId = expert.id;
          els.selectedExpert.textContent = `${expert.label || expert.name} (${expert.id})`;
          saveState();
          renderExperts();
        };
        els.expertList.appendChild(item);
      });
    }

    function setMode(mode) {
      state.mode = mode;
      els.modeChat.classList.toggle('active', mode === 'chat');
      els.modeMicro.classList.toggle('active', mode === 'micro');

      const isChat = mode === 'chat';
      els.filters.hidden = !isChat;
      els.expertList.hidden = !isChat;
      els.microBrief.hidden = isChat;
      els.filters.style.display = isChat ? '' : 'none';
      els.expertList.style.display = isChat ? '' : 'none';
      els.microBrief.style.display = isChat ? 'none' : '';
      els.modeLabel.textContent = mode === 'chat' ? '单专家模式' : 'NEXUS-Micro 模式';

      const isDeep = state.thinkingMode === 'deep';
      if (mode === 'chat') {
        els.hintText.textContent = isDeep
          ? '深度思考：单专家逐步推理，支持流式输出。'
          : '单专家模式：不选专家时将自动路由。';
        if (!state.selectedExpertId) els.selectedExpert.textContent = '自动路由';
      } else {
        els.hintText.textContent = isDeep
          ? 'NEXUS-Micro 深度思考：4 步均使用深度模式，完成后一次性展示。'
          : 'NEXUS-Micro：P1 事故响应 4 步协作，等待期间显示计时。';
        els.selectedExpert.textContent = 'incident-response / P1';
      }
      renderExampleChips();
      saveState();
    }

    function setThinkingMode(mode) {
      state.thinkingMode = mode;
      renderThinkingToggle();
      setMode(state.mode);
      saveState();
    }

    function showErrorWithRetry(message, retryFn) {
      const node = createAssistantNode(message, { error: true, badge: '请求失败' });
      const retryBtn = document.createElement('button');
      retryBtn.type = 'button';
      retryBtn.textContent = '重试';
      retryBtn.onclick = () => {
        node.remove();
        retryFn();
      };
      const actions = node.querySelector('.msg-actions') || (() => {
        const wrap = document.createElement('div');
        wrap.className = 'msg-actions';
        node.appendChild(wrap);
        return wrap;
      })();
      actions.appendChild(retryBtn);
      els.messages.appendChild(node);
      els.messages.scrollTop = els.messages.scrollHeight;
    }

    async function sendChatStream(text, signal) {
      const res = await fetch(`${API_BASE}/chat/stream`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          expert_id: state.selectedExpertId,
          thinking_mode: state.thinkingMode,
        }),
        signal,
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || '请求失败');
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';
      let meta = null;
      let fullText = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const event = JSON.parse(line.slice(6));
          if (event.type === 'error') throw new Error(event.detail || '流式请求失败');
          if (event.type === 'meta') {
            meta = event;
            if (event.estimate_seconds) {
              state.waitEstimate = event.estimate_seconds;
            }
          }
          if (event.type === 'chunk') {
            fullText += event.content;
          }
          if (event.type === 'done') {
            stopWaitTimer();
            const badge = meta
              ? `${meta.expert_label || meta.expert_name}${meta.routed ? ' · 自动路由' : ''}${meta.thinking_mode === 'deep' ? ' · 深度思考' : ''}`
              : '';
            const metaLine = `耗时 ${formatElapsed(event.elapsed_ms)} · ${state.thinkingMode === 'deep' ? '深度思考' : '快速模式'}`;
            const content = fullText || event.response || '';
            const node = createAssistantNode(content, { badge, meta: metaLine });
            node.querySelector('[data-copy]')?.addEventListener('click', async () => {
              try { await navigator.clipboard.writeText(content); } catch (_) {}
            });
            els.messages.appendChild(node);
            els.messages.scrollTop = els.messages.scrollHeight;
            appendToHistory('assistant', content, { badge, meta: metaLine });
          }
        }
      }
    }

    async function sendChatFallback(text, signal) {
      const res = await fetch(`${API_BASE}/chat`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          message: text,
          expert_id: state.selectedExpertId,
          thinking_mode: state.thinkingMode,
        }),
        signal,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '请求失败');
      stopWaitTimer();
      const meta = `耗时 ${formatElapsed(data.elapsed_ms)} · ${data.thinking_mode === 'deep' ? '深度思考' : '快速模式'}`;
      addMessage('assistant', data.response, {
        badge: `${data.expert_label || data.expert_name}${data.routed ? ' · 自动路由' : ''}${data.thinking_mode === 'deep' ? ' · 深度思考' : ''}`,
        meta,
      });
    }

    async function sendMicroStream(text, signal) {
      const res = await fetch(`${API_BASE}/micro/stream`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          incident: text,
          thinking_mode: state.thinkingMode,
        }),
        signal,
      });
      if (!res.ok) {
        const data = await res.json().catch(() => ({}));
        throw new Error(data.detail || '请求失败');
      }

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buffer = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buffer += decoder.decode(value, { stream: true });
        const lines = buffer.split('\n');
        buffer = lines.pop() || '';
        for (const line of lines) {
          if (!line.startsWith('data: ')) continue;
          const event = JSON.parse(line.slice(6));
          if (event.type === 'error') throw new Error(event.detail || '流式请求失败');
          if (event.type === 'meta' && event.estimate_seconds) {
            state.waitEstimate = event.estimate_seconds;
          }
          if (event.type === 'step_start') {
            state.waitStepLine = microStepStatusLine(event);
            refreshStatusBubbleNow();
          }
          if (event.type === 'step_done') {
            const next = event.step < event.total_steps
              ? `Step ${event.step} 完成，准备 Step ${event.step + 1}…`
              : `Step ${event.step} 完成，正在汇总…`;
            state.waitStepLine = next;
            refreshStatusBubbleNow();
          }
          if (event.type === 'done') {
            stopWaitTimer();
            renderMicroSteps(event);
          }
        }
      }
    }

    async function sendMicroFallback(text, signal) {
      const res = await fetch(`${API_BASE}/micro`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          incident: text,
          thinking_mode: state.thinkingMode,
        }),
        signal,
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.detail || '请求失败');
      stopWaitTimer();
      renderMicroSteps(data);
    }

    async function sendMessage(retryText) {
      const text = (retryText || els.input.value).trim();
      if (!text || state.loading) return;

      state.lastFailedRequest = null;
      if (!retryText) {
        addMessage('user', text);
        els.input.value = '';
      }

      state.abortController = new AbortController();
      setLoading(true);
      startWaitTimer(state.thinkingMode, state.mode === 'micro');

      const doSend = async () => {
        try {
          if (state.mode === 'chat') {
            try {
              await sendChatStream(text, state.abortController.signal);
            } catch (streamErr) {
              if (streamErr.name === 'AbortError') throw streamErr;
              await sendChatFallback(text, state.abortController.signal);
            }
          } else {
            try {
              await sendMicroStream(text, state.abortController.signal);
            } catch (streamErr) {
              if (streamErr.name === 'AbortError') throw streamErr;
              await sendMicroFallback(text, state.abortController.signal);
            }
          }
        } catch (error) {
          stopWaitTimer();
          if (error.name === 'AbortError') {
            addMessage('assistant', '已取消请求。', { copyable: false });
            return;
          }
          state.lastFailedRequest = text;
          showErrorWithRetry(`错误：${error.message}`, () => sendMessage(state.lastFailedRequest));
        } finally {
          setLoading(false);
          state.abortController = null;
        }
      };

      await doSend();
    }

    function cancelRequest() {
      state.abortController?.abort();
    }

    els.modeChat.onclick = () => setMode('chat');
    els.modeMicro.onclick = () => setMode('micro');
    els.sendBtn.onclick = () => sendMessage();
    els.cancelBtn.onclick = cancelRequest;
    els.searchInput.oninput = () => loadExperts();
    els.divisionSelect.onchange = () => loadExperts();
    els.thinkingToggle.querySelectorAll('button').forEach((btn) => {
      btn.onclick = () => setThinkingMode(btn.dataset.mode);
    });
    els.input.addEventListener('keydown', (event) => {
      if (event.key === 'Enter' && !event.shiftKey) {
        event.preventDefault();
        sendMessage();
      }
    });

    async function init() {
      loadState();
      renderThinkingToggle();
      await loadHealth();
      const healthRes = await fetch(`${API_BASE}/health`);
      const health = await healthRes.json();
      (health.divisions || []).forEach((division) => {
        const option = document.createElement('option');
        if (typeof division === 'string') {
          option.value = division;
          option.textContent = division;
        } else {
          option.value = division.id;
          option.textContent = division.label;
        }
        els.divisionSelect.appendChild(option);
      });
      await Promise.all([loadExperts(), loadPipeline()]);
      setMode(state.mode);
      if (state.messages.length) renderMessagesFromState();
      else showWelcome();
    }

    init();
  </script>
</body>
</html>
